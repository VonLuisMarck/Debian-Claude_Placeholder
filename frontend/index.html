<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailForge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3147;
      padding: 0 28px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo { font-size: 18px; font-weight: 700; color: #f8fafc; letter-spacing: -.3px; }
    .logo span { color: #ef4444; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 54px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #13151f;
      border-right: 1px solid #2d3147;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-top { padding: 18px 16px 8px; flex: 1; }
    .section-label {
      font-size: 10px; font-weight: 600; color: #475569;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
    }
    .scenario-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; text-align: left;
      background: none; border: none;
      padding: 10px 12px;
      color: #94a3b8; font-size: 13px;
      cursor: pointer;
      border-radius: 7px; margin-bottom: 2px;
      border-left: 3px solid transparent;
      transition: background .14s, color .14s;
    }
    .scenario-btn:hover { background: #1e2130; color: #e2e8f0; }
    .scenario-btn.active {
      background: #1e2130; color: #f1f5f9;
      border-left-color: #ef4444; font-weight: 600;
    }
    .scenario-btn .s-icon { font-size: 16px; flex-shrink: 0; }
    .scenario-btn .s-info { display: flex; flex-direction: column; }
    .scenario-btn .s-name { font-size: 12.5px; }
    .scenario-btn .s-key  { font-size: 10px; color: #475569; font-family: monospace; margin-top: 1px; }
    .scenario-btn.active .s-key { color: #64748b; }

    .sidebar-footer {
      padding: 12px 16px 16px;
      border-top: 1px solid #2d3147;
    }
    .regen-btn {
      width: 100%; padding: 8px;
      background: #1e2130; border: 1px solid #2d3147; border-radius: 7px;
      color: #94a3b8; font-size: 12px;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .regen-btn:hover:not(:disabled) { background: #252a3a; color: #e2e8f0; }
    .regen-btn:disabled { opacity: .4; cursor: default; }

    /* ── Email panel ── */
    .email-panel { overflow-y: auto; padding: 24px 28px; background: #0f1117; }

    /* AI generation overlay */
    .ai-overlay {
      background: #1a1d27; border: 1px solid #2d3147; border-radius: 10px;
      padding: 32px 28px;
      display: none; flex-direction: column; gap: 16px;
      max-width: 780px;
    }
    .ai-overlay.visible { display: flex; }
    .ai-header { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #64748b; }
    .ai-pulse {
      width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    .ai-steps { display: flex; flex-direction: column; gap: 10px; }
    .ai-step { display: flex; align-items: center; gap: 10px; font-size: 12.5px; color: #475569; transition: color .3s; }
    .ai-step.done   { color: #94a3b8; }
    .ai-step.active { color: #e2e8f0; }
    .ai-step-icon { width: 18px; text-align: center; }
    .ai-step.done    .ai-step-icon::before { content: "✓"; color: #22c55e; }
    .ai-step.pending .ai-step-icon::before { content: "·"; color: #334155; }
    .ai-step-spin { width:12px;height:12px;border:1.5px solid #2d3147;border-top-color:#ef4444;border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-preview {
      background: #13151f; border-radius: 6px;
      padding: 14px 16px; font-size: 12px; font-family: monospace;
      color: #64748b; line-height: 1.7; min-height: 60px;
      white-space: pre-wrap;
    }
    .ai-cursor { display:inline-block;width:1px;height:13px;background:#ef4444;margin-left:1px;animation:blink .6s step-end infinite;vertical-align:text-bottom; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 70%; gap: 12px; color: #334155;
    }
    .empty-state .icon { font-size: 44px; }
    .empty-state p { font-size: 13px; }

    /* Email wrapper */
    #email-wrapper { display: none; max-width: 780px; }
    #email-wrapper.visible { display: block; }

    /* Toolbar above email */
    .email-actions {
      display: flex; justify-content: flex-end;
      margin-bottom: 10px; gap: 8px;
    }
    .open-html-btn {
      padding: 7px 14px;
      background: #1e2130; border: 1px solid #2d3147; border-radius: 7px;
      color: #94a3b8; font-size: 12px;
      cursor: pointer; transition: background .15s, color .15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .open-html-btn:hover { background: #252a3a; color: #e2e8f0; }

    /* Email card */
    .email-card {
      background: #1a1d27; border: 1px solid #2d3147;
      border-radius: 10px; overflow: hidden;
    }
    .email-toolbar {
      background: #13151f; border-bottom: 1px solid #2d3147;
      padding: 10px 16px; display: flex; gap: 6px;
    }
    .email-toolbar span { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r{background:#ef4444} .dot-y{background:#f59e0b} .dot-g{background:#22c55e}
    .email-header { padding: 20px 24px 16px; border-bottom: 1px solid #2d3147; }
    .email-subject { font-size: 16px; font-weight: 600; color: #f1f5f9; margin-bottom: 14px; line-height: 1.4; }
    .email-meta-row { display: flex; align-items: baseline; gap: 8px; font-size: 13px; margin-bottom: 3px; }
    .meta-label { color: #475569; min-width: 44px; }
    .meta-name  { color: #e2e8f0; font-weight: 500; }
    .meta-addr  { color: #94a3b8; font-size: 11.5px; font-family: monospace; background: #1e2130; padding: 1px 5px; border-radius: 3px; }
    .email-body {
      padding: 22px 24px; font-size: 13.5px; line-height: 1.8;
      color: #cbd5e1; white-space: pre-wrap;
    }
    .email-body a { color: #60a5fa; text-decoration: none; }
    .email-body a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo">Mail<span>Forge</span></div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="section-label">Escenarios</div>
      <div id="scenario-list"></div>
    </div>
    <div class="sidebar-footer">
      <button class="regen-btn" id="regen-btn" disabled>↻ Regenerar variante</button>
    </div>
  </aside>

  <!-- ── Email panel ── -->
  <main class="email-panel">

    <div class="empty-state" id="empty-state">
      <div class="icon">✉</div>
      <p>Selecciona un escenario para generar el email</p>
    </div>

    <div class="ai-overlay" id="ai-overlay">
      <div class="ai-header">
        <div class="ai-pulse"></div>
        <span id="ai-label">Generando email…</span>
      </div>
      <div class="ai-steps" id="ai-steps"></div>
      <div class="ai-preview" id="ai-preview"><span class="ai-cursor"></span></div>
    </div>

    <div id="email-wrapper">
      <div class="email-actions">
        <button class="open-html-btn" id="open-html-btn">↗ Abrir en pestaña</button>
        <button class="open-html-btn" id="download-html-btn">⬇ Descargar HTML</button>
      </div>
      <div class="email-card">
        <div class="email-toolbar">
          <span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span>
        </div>
        <div class="email-header">
          <div class="email-subject" id="e-subject"></div>
          <div>
            <div class="email-meta-row">
              <span class="meta-label">De</span>
              <span class="meta-name" id="e-name"></span>
            </div>
            <div class="email-meta-row">
              <span class="meta-label"></span>
              <span class="meta-addr" id="e-addr"></span>
            </div>
          </div>
        </div>
        <div class="email-body" id="e-body"></div>
      </div>
    </div>

  </main>
</div>

<script>
const LABELS = {
  banco_urgente:           { name: "Banco — Cuenta suspendida",       icon: "🏦" },
  it_soporte_credenciales: { name: "IT Helpdesk — Contraseña",        icon: "💻" },
  paquete_entrega:         { name: "Correos — Paquete retenido",      icon: "📦" },
  microsoft_cuenta:        { name: "Microsoft — Acceso sospechoso",   icon: "🪟" },
  vpn_acceso_caducado:     { name: "VPN — Credenciales caducadas",    icon: "🔐" },
  rrhh_nomina:             { name: "RRHH — Datos bancarios nómina",   icon: "💼" },
};

const AI_STEPS = [
  "Seleccionando plantilla",
  "Personalizando remitente",
  "Inyectando variables",
  "Insertando enlace",
  "Renderizando cuerpo",
];

let current = null;
let lastData = null;

async function loadScenarios() {
  const list = await fetch("/api/scenarios").then(r => r.json());
  const container = document.getElementById("scenario-list");
  list.forEach(s => {
    const info = LABELS[s] || { name: s, icon: "📧" };
    const btn = document.createElement("button");
    btn.className = "scenario-btn";
    btn.dataset.scenario = s;
    btn.innerHTML = `
      <span class="s-icon">${info.icon}</span>
      <span class="s-info">
        <span class="s-name">${info.name}</span>
        <span class="s-key">${s}</span>
      </span>`;
    btn.onclick = () => selectScenario(s);
    container.appendChild(btn);
  });
}

function selectScenario(scenario) {
  current = scenario;
  document.querySelectorAll(".scenario-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.scenario === scenario)
  );
  generateEmail();
}

async function generateEmail() {
  if (!current) return;

  document.getElementById("empty-state").style.display = "none";
  document.getElementById("email-wrapper").classList.remove("visible");
  document.getElementById("regen-btn").disabled = true;

  const overlay = document.getElementById("ai-overlay");
  overlay.classList.add("visible");

  // Build steps
  const stepsEl = document.getElementById("ai-steps");
  stepsEl.innerHTML = "";
  const stepEls = AI_STEPS.map(label => {
    const div = document.createElement("div");
    div.className = "ai-step pending";
    div.innerHTML = `<span class="ai-step-icon"></span><span>${label}</span>`;
    stepsEl.appendChild(div);
    return div;
  });

  const preview = document.getElementById("ai-preview");
  preview.innerHTML = '<span class="ai-cursor"></span>';

  const fetchPromise = fetch(`/api/generate/${current}`).then(r => r.json());

  for (let i = 0; i < stepEls.length; i++) {
    stepEls[i].className = "ai-step active";
    stepEls[i].querySelector(".ai-step-icon").innerHTML = '<span class="ai-step-spin"></span>';
    await sleep(400);
    stepEls[i].className = "ai-step done";
    stepEls[i].querySelector(".ai-step-icon").innerHTML = "";
  }

  lastData = await fetchPromise;

  // Typewriter
  document.getElementById("ai-label").textContent = "Escribiendo cuerpo…";
  const body = lastData.body;
  let typed = "";
  for (let i = 0; i < body.length; i += 3) {
    typed += body.slice(i, i + 3);
    preview.innerHTML = esc(typed) + '<span class="ai-cursor"></span>';
    preview.scrollTop = preview.scrollHeight;
    await sleep(16);
  }
  await sleep(280);

  overlay.classList.remove("visible");
  renderEmail(lastData);
}

function renderEmail(data) {
  document.getElementById("e-subject").textContent = data.subject;
  document.getElementById("e-name").textContent    = data.from_display;
  document.getElementById("e-addr").textContent    = data.from_email;

  // Linkify URLs in body
  let html = esc(data.body).replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
  document.getElementById("e-body").innerHTML = html;

  document.getElementById("email-wrapper").classList.add("visible");
  document.getElementById("regen-btn").disabled = false;
}

document.getElementById("open-html-btn").onclick = () => {
  if (!lastData) return;
  const blob = new Blob([buildHtmlEmail(lastData)], { type: "text/html" });
  window.open(URL.createObjectURL(blob), "_blank");
};

document.getElementById("download-html-btn").onclick = () => {
  if (!lastData) return;
  const blob = new Blob([buildHtmlEmail(lastData)], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${lastData.scenario}.html`;
  a.click();
};

document.getElementById("regen-btn").onclick = generateEmail;

function buildHtmlEmail(data) {
  const e    = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const body = e(data.body).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1">$1</a>');
  const date = new Date().toUTCString();
  return `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${e(data.subject)}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f1f3f4;padding:20px}
.wrap{max-width:680px;margin:0 auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.18);overflow:hidden}
.hdr{padding:20px 28px 16px;border-bottom:1px solid #e0e0e0}
.subj{font-size:20px;font-weight:400;color:#202124;margin-bottom:14px;line-height:1.4}
.meta{font-size:13px;color:#5f6368;line-height:1.8}
.meta strong{color:#202124}
.body{padding:24px 28px;font-size:14px;line-height:1.75;color:#202124;white-space:pre-wrap}
.body a{color:#1a73e8;text-decoration:none}
.body a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="subj">${e(data.subject)}</div>
    <div class="meta"><strong>${e(data.from_display)}</strong> &lt;${e(data.from_email)}&gt;<br>${date}</div>
  </div>
  <div class="body">${body}</div>
</div>
</body>
</html>`;
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

loadScenarios();
</script>
</body>
</html>
